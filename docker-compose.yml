services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: use-grafana-app
    ports:
      - "8080:8080"
    environment:
      - LOGSTASH_HOST=logstash
      - LOGSTASH_PORT=5000
    depends_on:
      - logstash
    networks:
      - observability

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.2
    container_name: use-grafana-elasticsearch
    ports:
      - "9200:9200"
      - "9300:9300"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    networks:
      - observability

  logstash:
    image: docker.elastic.co/logstash/logstash:8.15.2
    container_name: use-grafana-logstash
    ports:
      - "5000:5000"
    volumes:
      - ./logstash/logstash.conf:/usr/share/logstash/pipeline/logstash.conf:ro
    depends_on:
      - elasticsearch
    networks:
      - observability

  kibana:
    image: docker.elastic.co/kibana/kibana:8.15.2
    container_name: use-grafana-kibana
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    depends_on:
      - elasticsearch
    networks:
      - observability

networks:
  observability:
    driver: bridge
